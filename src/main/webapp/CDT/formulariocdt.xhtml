<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:f="http://xmlns.jcp.org/jsf/core">

<h:head>
    <title>Registro CDT</title>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"/>
</h:head>

<h:body>
<div class="container mt-5" style="max-width: 520px;">

    <div class="card shadow-sm">
        <div class="card-header bg-primary text-white">
            <h4 class="mb-0">Registro de CDT</h4>
        </div>

        <div class="card-body">
            <h:form id="frmCDT">
                <div class="mb-3">
                    <h:outputLabel for="inversion"
                                   value="Inversión ($)"
                                   styleClass="form-label fw-semibold"/>
                    <h:inputText id="inversion"
                                 value="#{cdtBean.dto.inversion}"
                                 required="true"
                                 requiredMessage="Ingresa el monto de inversión"
                                 styleClass="form-control"
                                 validatorMessage="La inversión debe ser mayor a 0">
                        <f:convertNumber minFractionDigits="2"
                                         converterMessage="Ingresa un número válido (ej: 1000000)"/>
                        <f:validateDoubleRange minimum="1"/>
                    </h:inputText>
                    <h:message for="inversion" styleClass="text-danger small mt-1 d-block"/>
                    <small class="text-muted">Mínimo $1. Ejemplo: 5000000</small>
                </div>
                <div class="mb-3">
                    <h:outputLabel for="interes"
                                   value="Tasa de interés anual"
                                   styleClass="form-label fw-semibold"/>
                    <h:inputText id="interes"
                                 value="#{cdtBean.dto.interes}"
                                 required="true"
                                 requiredMessage="Ingresa la tasa de interés"
                                 styleClass="form-control"
                                 validatorMessage="La tasa debe estar entre 0.001 y 1.0">
                        <f:convertNumber minFractionDigits="4"
                                         converterMessage="Ingresa un número válido (ej: 0.08)"/>
                        <f:validateDoubleRange minimum="0.001" maximum="1.0"/>
                    </h:inputText>
                    <h:message for="interes" styleClass="text-danger small mt-1 d-block"/>
                    <small class="text-muted">Entre 0.001 y 1.0. Ejemplo: 0.08 equivale al 8%</small>
                </div>

                <div class="mb-3">
                    <h:outputLabel for="plazo"
                                   value="Plazo (días)"
                                   styleClass="form-label fw-semibold"/>
                    <h:inputText id="plazo"
                                 value="#{cdtBean.dto.plazo}"
                                 required="true"
                                 requiredMessage="Ingresa el plazo en días"
                                 styleClass="form-control"
                                 validatorMessage="El plazo debe ser entre 30 y 1800 días">
                        <f:convertNumber integerOnly="true"
                                         converterMessage="Ingresa un número entero (ej: 180)"/>
                        <f:validateDoubleRange minimum="30" maximum="1800"/>
                    </h:inputText>
                    <h:message for="plazo" styleClass="text-danger small mt-1 d-block"/>
                    <small class="text-muted">Entre 30 y 1800 días. Ejemplo: 180</small>
                </div>

                <!-- Mensajes globales -->
                <h:messages globalOnly="true"
                            styleClass="alert alert-danger p-2 small"
                            layout="list"/>

                <div class="d-grid mt-4">
                    <a href="../index.xhtml" class="btn btn-outline-secondary">← Inicio</a>
                    <h:link value="Ver CDTs"
            			outcome="/CDT/resultadoscdt"
            			styleClass="btn btn-outline-success"/>
                    <h:commandButton value="Calcular y Registrar"
                                     action="#{cdtBean.registrar}"
                                     styleClass="btn btn-primary"/>
                </div>

            </h:form>
        </div>
    </div>

</div>
<footer class="fixed-bottom bg-dark text-white text-center py-2">
    Pedro Suarez | Programación Avanzada | [302] | Universidad Distrital | 2026
</footer>
</h:body>
</html>
